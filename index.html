<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lưu Bút 12A1</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:Poppins,sans-serif;
background:url('lop.jpg') center/cover fixed;
overflow:hidden;
}
.overlay{
position:fixed;inset:0;
background:linear-gradient(135deg,rgba(7,26,82,.8),rgba(30,136,229,.7));
}
.book-wrap{
height:100vh;display:flex;justify-content:center;align-items:center;
perspective:2500px;position:relative;z-index:2;
}
.book{width:900px;height:600px;position:relative}
.page{
position:absolute;inset:0;
background:rgba(255,255,255,.12);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.25);
border-radius:25px;
padding:40px;
color:white;
transform-origin:left;
transition:1.2s;
box-shadow:0 0 25px rgba(255,255,255,.2),0 0 60px rgba(100,180,255,.5);
}
.flip{transform:rotateY(-180deg)}
h1{
font-family:'Playfair Display',serif;
font-size:60px;
text-align:center;
text-shadow:0 0 10px #fff,0 0 30px #7ec8ff;
}
h2{text-align:center;margin-top:20px}
p{text-align:center;margin:15px 0}
.btn{
display:block;margin:25px auto;padding:14px 28px;
background:rgba(255,255,255,.15);
border:1px solid rgba(255,255,255,.4);
color:white;border-radius:15px;cursor:pointer
}
input,textarea{
width:100%;margin:10px 0;padding:14px;
border:none;border-radius:12px;
background:rgba(255,255,255,.15);
color:white;
}
input::placeholder,textarea::placeholder{color:#eee}
textarea{height:120px}
.petal{
position:fixed;top:-50px;z-index:5;
animation:fall linear infinite;
}
@keyframes fall{
to{transform:translate(350px,110vh) rotate(540deg)}
}
</style>
</head>
<body>
<div class="overlay"></div>

<div class="book-wrap">
<div class="book">

<div class="page" id="p3">
<h2>💌 Gửi lưu bút cho Quỳnh Nga </h2>
<input id="ten" placeholder="Họ tên">
<input id="bietdanh" placeholder="Biệt danh">
<textarea id="kyniem" placeholder="Kỷ niệm đáng nhớ"></textarea>
<textarea id="loinhan" placeholder="Điều muốn gửi tới Nga"></textarea>
<button class="btn" onclick="gui()">Gửi lưu bút ❤️</button>
<p id="msg"></p>
</div>

<div class="page" id="p2">
<h2>📖 Một chút thanh xuân</h2>
<p>Mỗi lời nhắn là một mảnh ký ức.</p>
<button class="btn" onclick="lat('p2')">Lật trang ➜</button>
</div>

<div class="page" id="p1">
<h1>Lưu Bút</h1>
<p>Gửi Nga Một Chút Thanh Xuân 🌸</p>
<p>2023 - 2026</p>
<button class="btn" onclick="lat('p1')">Mở Cuốn Sổ</button>
</div>

</div>
</div>

<script>
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbw2m_n23kUJg51rZtRwV9JJCnVgb9h65a9d2M3MvIejOhb5dVDgFrVnXX2J1mJZp3Wg/exec";

function lat(id){document.getElementById(id).classList.add('flip');}

async function gui(){
const data={
ten:ten.value,
bietdanh:bietdanh.value,
kyniem:kyniem.value,
loinhan:loinhan.value
};
try{
await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify(data)});
msg.innerText='💙 Đã gửi thành công!';
}catch(e){
msg.innerText='Hãy thay URL Apps Script.';
}
}

for(let i=0;i<40;i++){
let p=document.createElement('div');
p.className='petal';
p.innerHTML='🌸';
p.style.left=Math.random()*100+'vw';
p.style.fontSize=(14+Math.random()*20)+'px';
p.style.animationDuration=(8+Math.random()*10)+'s';
document.body.appendChild(p);
}
</script>
</body>
</html>
